name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    quality:
        name: Quality gates (typecheck · lint · test · build · format)
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --no-audit --prefer-offline

            - name: Typecheck (5 workspaces)
              run: npm run typecheck

            - name: Lint (0 errors required)
              run: npm run lint

            - name: Tests (210+ across 4 packages)
              run: npm test

            - name: Build extension
              run: npm run build

            - name: Format check
              run: npm run format:check

            - name: Bundle size guard (popup ≤ 500 kB gzipped)
              run: |
                  size=$(stat -c%s apps/extension/dist/assets/main-*.js | awk '{sum+=$1} END {print sum}')
                  echo "main bundle bytes: $size"
                  # Allow up to 1.6 MB raw (current ≈ 1.39 MB; growth budget for catalog+sections)
                  if [ "$size" -gt 1700000 ]; then
                      echo "::error::Main bundle exceeded 1.7 MB raw — investigate before merging"
                      exit 1
                  fi

    e2e:
        name: Playwright e2e (extension surfaces)
        runs-on: ubuntu-latest
        needs: quality
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci --no-audit --prefer-offline

            - name: Install Playwright Chromium with system deps
              run: npx playwright install --with-deps chromium

            - name: Build extension (Playwright loads dist/)
              run: npm run build

            - name: Run e2e suite
              run: npm run test:e2e --workspace=@utsaregplus/extension

            - name: Upload Playwright report on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: apps/extension/playwright-report/
                  retention-days: 7
